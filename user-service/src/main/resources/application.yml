app:
  config:
    jwt-sign: ${JWT_SIGN:super-secret-sign}
    expiration-date: 28800000 # 8 hours in milliseconds
    email-pattern: ${EMAIL_PATTERN:\b[\w\.-]+@[\w\.-]+\.\w{2,4}\b}
    password-pattern: ${PASSWORD_PATTERN:^(?=.*[0-9])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{4,}}
spring:
  application:
    name: user-service
  jackson:
    property-naming-strategy: SNAKE_CASE
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:users;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      idle-timeout: 10000
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        globally_quoted_identifiers: true
        jdbc:
          time_zone: ${TIME_ZONE:UTC}
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVLET_CONTEXT_PATH:}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
