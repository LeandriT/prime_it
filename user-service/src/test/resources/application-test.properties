# =========================
# App config (JWT y patrones)
# =========================
app.config.jwt-sign=${JWT_SIGN:super-secret-sign}
app.config.expiration-date=28800000
app.config.email-pattern=${EMAIL_PATTERN:\\b[\\w\\.-]+@[\\w\\.-]+\\.\\w{2,4}\\b}
app.config.password-pattern=${PASSWORD_PATTERN:^(?=.*[0-9])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{4,}}
# =========================
# Spring app
# =========================
spring.application.name=user-service
spring.jackson.property-naming-strategy=SNAKE_CASE
# =========================
# H2 + Datasource
# =========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:users;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
# =========================
# JPA / Hibernate
# =========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.jdbc.time_zone=${TIME_ZONE:UTC}
spring.jpa.properties.hibernate.format_sql=true
# =========================
# Server
# =========================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVLET_CONTEXT_PATH:}
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never